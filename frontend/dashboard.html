<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Freelance Job Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="dashboard-view" class="view active">
        <header class="glassmorphism">
            <div class="header-content">
                <h1>Freelance Hub</h1>
                <button id="logout-btn" class="btn secondary-btn">Logout</button>
            </div>
        </header>

        <main class="dashboard-container">
            <!-- Add Job Section -->
            <section class="add-job-section glassmorphism">
                <h3>Post a New Job</h3>
                <form id="add-job-form">
                    <div class="form-row">
                        <input type="text" id="job-title" placeholder="Job Title" required>
                        <input type="text" id="job-client" placeholder="Client Name" required>
                    </div>
                    <div class="form-row">
                        <input type="text" id="job-budget" placeholder="Budget (e.g. $500)" required>
                    </div>
                    <textarea id="job-desc" placeholder="Job Description" rows="3" required></textarea>
                    <button type="submit" class="btn primary-btn action-btn">Add Job</button>
                </form>
            </section>

            <!-- Job List Section -->
            <section class="jobs-display-section">
                <h3>Available Jobs</h3>
                <div class="loader hidden" id="jobs-loader">Loading jobs...</div>
                <div id="jobs-list" class="jobs-grid">
                    <!-- Job cards injected via JS -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
